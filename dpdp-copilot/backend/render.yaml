services:
  - type: web
    name: dpdp-copilot-api
    runtime: python
    region: singapore
    plan: free
    rootDir: dpdp-copilot/backend
    buildCommand: |
      pip install -r requirements.txt
      python -m app.knowledge.ingest --rebuild
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CHROMA_DIR
        value: data/chroma_db
      - key: LOG_LEVEL
        value: INFO
